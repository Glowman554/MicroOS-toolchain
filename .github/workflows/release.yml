name: Release

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bison flex libgmp-dev libmpc-dev libmpfr-dev \
            texinfo wget curl git xorriso autoconf automake \
            libtool pkg-config

      - name: Cache toolchain
        uses: actions/cache@v4
        with:
          path: .toolchain
          key: toolchain-${{ hashFiles('toolchain/build.sh', 'toolchain/libc/**') }}

      - name: Build toolchain
        run: |
          if [ ! -f ".toolchain/bin/i686-microos-gcc" ]; then
            cd toolchain
            bash build.sh
          fi

      - name: Build ports
        run: bash build.sh

      - name: release
        run: MICROOS_BUILD_TOKEN=${{ secrets.MICROOS_BUILD_TOKEN }} MICROOS_UPLOAD_TOKEN=${{ secrets.MICROOS_UPLOAD_TOKEN }} bash website.sh

      - name: Package toolchain
        run: tar -czf toolchain.tar.gz .toolchain

      - name: Upload toolchain to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: toolchain-latest
          name: Toolchain
          body: Pre-built i686-microos cross-compilation toolchain
          files: toolchain.tar.gz
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}